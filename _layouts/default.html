<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">

<body>
  <div class="canopy">

        <linearGradient id="bottomfade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F4F9F1" stop-opacity="0"/>
          <stop offset="100%" stop-color="#F4F9F1" stop-opacity="1"/>

      </defs>
      <ellipse cx="346" cy="30" rx="160" ry="90" fill="url(#lightburst)"/>
      <ellipse cx="80" cy="60" rx="110" ry="80" fill="#1B5E20" opacity="0.7"/>
      <ellipse cx="200" cy="40" rx="130" ry="90" fill="#2E7D32" opacity="0.6"/>

      <ellipse cx="500" cy="105" rx="115" ry="80" fill="#2E7D32" opacity="0.9"/>
      <ellipse cx="630" cy="115" rx="100" ry="75" fill="#1B5E20" opacity="0.95"/>
      <ellipse cx="310" cy="68" rx="32" ry="20" fill="#81C784" opacity="0.65"/>
      <ellipse cx="420" cy="74" rx="26" ry="16" fill="#66BB6A" opacity="0.6"/>
      <rect x="0" y="140" width="680" height="60" fill="url(#bottomfade)"/>
    </svg>
    <p class="canopy-text">climate · capital · resilience</p>
  </div>
  <nav class="site-nav-bar">
    <a class="site-title" href="/">Valentina Ramírez</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/blog">Blog</a>
    </div>
  </nav>
  <main class="page-content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <span>Valentina Ramírez · London</span>
    <span>valentina.ramirez.m@protonmail.com</span>
  </footer>
</body>
</html>
